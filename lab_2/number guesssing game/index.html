<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Guessing Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient-bg" aria-hidden="true"></div>

  <main class="game-shell">
    <header class="hero">
      <p class="tag">Vanilla JavaScript Game</p>
      <h1>Number Guessing Challenge</h1>
      <p class="subtitle">I picked a number from 1 to 100. Can you find it in 10 tries?</p>
    </header>

    <section class="panel" aria-live="polite">
      <div class="stats-row">
        <div class="stat-pill">
          <span>Attempts Left</span>
          <strong id="attempts-left">10</strong>
        </div>
        <div class="stat-pill">
          <span>Best Score</span>
          <strong id="best-score">-</strong>
        </div>
      </div>

      <form id="guess-form" class="guess-form">
        <label for="guess-input">Your Guess</label>
        <div class="input-row">
          <input id="guess-input" type="number" min="1" max="100" placeholder="Enter 1-100" required />
          <button type="submit">Guess</button>
        </div>
      </form>

      <p id="message" class="message">Start guessing...</p>

      <div class="actions">
        <button id="new-game" type="button" class="secondary">New Game</button>
      </div>

      <div class="history-wrap">
        <h2>Guess History</h2>
        <ul id="history" class="history-list"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
