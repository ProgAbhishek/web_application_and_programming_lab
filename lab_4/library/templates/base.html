<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Library{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body { background-color: #f8f9fa; }
    .auth-card {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 12px;
      padding: 2rem;
    }
    .auth-card h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; }
    .navbar-brand { font-weight: 600; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="{% url 'book_list' %}">📚 Library</a>
  <div class="ms-auto">
    {% if user.is_authenticated %}
      <span class="text-white me-3">Hello, <strong>{{ user.username }}</strong></span>
      <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
    {% else %}
      <a href="{% url 'login' %}"    class="btn btn-outline-light btn-sm me-2">Login</a>
      <a href="{% url 'register' %}" class="btn btn-light btn-sm">Register</a>
    {% endif %}
  </div>
</nav>

<div class="container">
  {% if messages %}
    <div class="mt-3">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
